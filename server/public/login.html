<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Kanban Game — Вход</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.auth-box { background: #fff; border-radius: 8px; padding: 36px 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.logo { font-size: 22px; font-weight: 700; color: #333; margin-bottom: 24px; text-align: center; }
.logo span { color: #e67e22; }
.tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
.tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: #e67e22; border-bottom-color: #e67e22; }
label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; margin-top: 14px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; outline: none; }
input:focus { border-color: #e67e22; }
.btn { width: 100%; margin-top: 20px; padding: 11px; background: #e67e22; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn:hover { background: #d35400; }
.error { color: #c0392b; font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }
.form-section { display: none; }
.form-section.active { display: block; }
</style>
</head>
<body>
<div class="auth-box">
  <div class="logo">Kanban<span>game</span></div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Вход</div>
    <div class="tab" onclick="switchTab('register')">Регистрация</div>
  </div>

  <!-- Вход -->
  <div id="login-form" class="form-section active">
    <label>Логин</label>
    <input id="l-login" type="text" placeholder="Введите логин" autocomplete="username">
    <label>Пароль</label>
    <input id="l-pass" type="password" placeholder="Введите пароль" autocomplete="current-password">
    <button class="btn" onclick="doLogin()">Войти</button>
    <div class="error" id="l-error"></div>
  </div>

  <!-- Регистрация -->
  <div id="register-form" class="form-section">
    <label>Логин</label>
    <input id="r-login" type="text" placeholder="Придумайте логин" autocomplete="username">
    <label>Пароль</label>
    <input id="r-pass" type="password" placeholder="Придумайте пароль" autocomplete="new-password">
    <label>Подтверждение пароля</label>
    <input id="r-pass2" type="password" placeholder="Повторите пароль" autocomplete="new-password">
    <button class="btn" onclick="doRegister()">Зарегистрироваться</button>
    <div class="error" id="r-error"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// Если уже авторизован — сразу на дашборд
if (getToken()) window.location.href = 'dashboard.html';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').classList.toggle('active', tab === 'login');
  document.getElementById('register-form').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const login = document.getElementById('l-login').value.trim();
  const password = document.getElementById('l-pass').value;
  const errEl = document.getElementById('l-error');
  errEl.textContent = '';
  try {
    const data = await API.login(login, password);
    setToken(data.token);
    setUser(data.user);
    window.location.href = 'dashboard.html';
  } catch(e) {
    errEl.textContent = e.message;
  }
}

async function doRegister() {
  const login = document.getElementById('r-login').value.trim();
  const pass  = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;
  const errEl = document.getElementById('r-error');
  errEl.textContent = '';
  if (pass !== pass2) { errEl.textContent = 'Пароли не совпадают'; return; }
  try {
    const data = await API.register(login, pass);
    setToken(data.token);
    setUser(data.user);
    window.location.href = 'dashboard.html';
  } catch(e) {
    errEl.textContent = e.message;
  }
}

// Enter — отправить форму
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.form-section.active');
  if (active.id === 'login-form') doLogin();
  else doRegister();
});
</script>
</body>
</html>
